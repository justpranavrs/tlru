name: CI Pipeline

on:
  push:
    branches: ['main', 'dev']
  pull_request:
    branches: ['main', 'dev']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
         go-version: '1.26'

      - name: "Install"
        run: "go install golang.org/x/tools/cmd/goimports@latest"

      - name: Golangci-lint
        uses: golangci/golangci-lint-action@v9.2.1
        with:
            version: v2.12.2
          
      - name: "Test"
        run: "make test"
      
      - name: "Race"
        run: "make race"

      - name: "FuzzLRUCore"
        run : "go test -fuzz=FuzzLRUCore -fuzztime=30s ./lrucore"
        
      - name: "FuzzLRU"
        run : "go test -fuzz=FuzzLRU -fuzztime=30s ."

      - name: "Bench"
        run : "make bench"
