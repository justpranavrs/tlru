name: CI Pipeline

on:
  pull_request:
    branches: ['main']
    paths:
      - '**/*.go'
      - 'go.mod'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
         go-version: '1.24'

      - name: "Install"
        run: "go install golang.org/x/tools/cmd/goimports@latest"

      - name: Golangci-lint
        uses: golangci/golangci-lint-action@v9.2.1
        with:
            version: v2.12.2
          
      - name: "Test"
        run: "make test"
      
      - name: "Race"
        run: "make race"
